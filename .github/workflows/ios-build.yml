name: iOS Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Capacitor iOS project
        run: npx @capacitor/cli sync ios

      - name: Build unsigned .app
        working-directory: ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package .app
        run: |
          mkdir -p dist
          cp -R ios/App/build/Build/Products/Release-iphoneos/App.app dist/
          cd dist && zip -r ../Spartan-iOS.zip App.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spartan-iOS
          path: Spartan-iOS.zip
