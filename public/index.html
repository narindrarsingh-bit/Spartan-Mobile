<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="color-scheme" content="dark">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Spartan">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Spartan</title>
  <link rel="icon" href="spart.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="vendor/xterm/xterm.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- LEFT SIDEBAR — Discord-style agent rail -->
    <nav class="sidebar" id="sidebar">
      <!-- Logo at top -->
      <div class="sidebar-icon sidebar-logo" id="sidebar-logo" title="Spartan">
        <img src="spart.png" alt="Spartan" width="48" height="48">
      </div>

      <div class="sidebar-sep"></div>

      <!-- Agent circles — populated by JS -->
      <div class="sidebar-list" id="sidebar-list"></div>

      <!-- Settings gear at bottom -->
      <div class="sidebar-icon" id="btn-settings" title="Settings">
        <svg viewBox="0 0 28 28" width="28" height="28">
          <circle cx="14" cy="14" r="14" fill="#40444b"/>
          <path d="M14 10.2a3.8 3.8 0 110 7.6 3.8 3.8 0 010-7.6m0 2a1.8 1.8 0 100 3.6 1.8 1.8 0 000-3.6" fill="#b5bac1" stroke="#b5bac1" stroke-width="1.2"/>
          <path d="M14 3.5l.7 2.5h2.8l.7 2 2-.7 1.5 1.5-.7 2 2 .7v2.8l-2 .7.7 2-1.5 1.5-2-.7-.7 2h-2.8l-.7 2.5-1.5-1.5-2 .7-1.5-1.5.7-2-2-.7V13l-2-.7.7-2L6 8.8l1.5-1.5 2 .7.7-2H13l.7-2.5z" fill="#b5bac1"/>
        </svg>
      </div>
    </nav>

    <!-- THREAD PANEL — slides out when agent tapped -->
    <aside class="thread-panel" id="thread-panel">
      <div class="thread-panel-header" id="thread-panel-header">
        <span id="thread-panel-name">Threads</span>
      </div>
      <div class="thread-panel-list" id="thread-panel-list">
        <!-- + button + thread circles populated by JS -->
      </div>
    </aside>

    <!-- MAIN CHANNEL AREA -->
    <main class="main">

      <!-- Top bar — agent name -->
      <header class="topbar">
        <h1 class="topbar-title" id="topbar-title"># hermes</h1>
        <div class="topbar-status">
          <span class="status-dot" id="status-dot"></span>
          <span class="status-text" id="status-text">disconnected</span>
        </div>
      </header>

      <!-- Scrollable output -->
      <div class="output-wrap" id="output-wrap">
        <div class="output terminal-mount" id="output"></div>
      </div>

      <!-- Composer dock — isolated bottom region -->
      <footer class="composer-dock">
        <form class="input-bar" id="command-form" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <div class="input-shell">
            <input
              id="command-input"
              type="text"
              placeholder="Type a message..."
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              spellcheck="false"
              enterkeyhint="send"
            >
            <button type="submit" class="btn-send" aria-label="Send">
              <svg viewBox="0 0 20 20" width="20" height="20"><path d="M2 10l16-6-7 7 3 3z" fill="currentColor"/></svg>
            </button>
          </div>
        </form>
      </footer>
    </main>
  </div>

  <!-- Settings modal -->
  <div class="modal-overlay hidden" id="settings-overlay">
    <div class="modal" id="settings-modal">
      <h2>Settings</h2>
      <label>Server
        <input id="setting-server" type="text">
      </label>
      <label>Token
        <input id="setting-token" type="password">
      </label>
      <div class="trust-actions">
        <a href="spartan-ca.mobileconfig">Install iPhone Trust Profile</a>
        <a href="spartan-ca.cer">Download CA Certificate</a>
      </div>
      <div class="modal-actions">
        <button id="btn-save-settings">Save</button>
        <button id="btn-close-settings">Close</button>
      </div>
    </div>
  </div>

  <script src="vendor/xterm/xterm.js"></script>
  <script src="vendor/xterm-addon-fit/addon-fit.js"></script>
  <script src="app.js"></script>
</body>
</html>
