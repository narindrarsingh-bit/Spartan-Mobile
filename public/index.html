<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#313338">
  <title>Spartan</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="icon.png">
</head>
<body>
  <div id="app">
    <!-- Top bar: channel name + status -->
    <header id="header">
      <div class="header-left">
        <span class="hash">#</span>
        <span id="channel-name" class="channel-name">shell</span>
      </div>
      <div class="header-right">
        <span id="status-dot" class="status-dot disconnected"></span>
      </div>
    </header>

    <!-- Profile tabs (like Discord channels) -->
    <nav id="profile-tabs">
      <button class="profile-tab active" data-profile="shell">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        <span>shell</span>
      </button>
      <button class="profile-tab" data-profile="qwen">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
        <span>qwen</span>
      </button>
      <button class="profile-tab" data-profile="hermes">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span>hermes</span>
      </button>
    </nav>

    <!-- Messages area -->
    <main id="output" role="log" aria-live="polite"></main>

    <!-- Input bar (sticky bottom) -->
    <footer id="input-area">
      <form id="command-form" autocomplete="off">
        <div id="input-wrapper">
          <input
            type="text"
            id="command-input"
            placeholder="Type a message..."
            autocomplete="off"
            autocapitalize="none"
            autocorrect="off"
            spellcheck="false"
            enterkeyhint="send"
          >
        </div>
        <button type="submit" id="send-btn" aria-label="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </form>
    </footer>
  </div>

  <!-- Settings panel -->
  <div id="settings-panel" class="settings-panel" hidden>
    <div class="settings-overlay" id="settings-overlay"></div>
    <div class="settings-content">
      <div class="settings-header">
        <span>Server Settings</span>
        <button id="close-settings" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="settings-body">
        <div class="setting-group">
          <label for="server-address">Server</label>
          <input type="text" id="server-address" placeholder="100.78.120.128:8797">
        </div>
        <div class="setting-group">
          <label for="auth-token">Token</label>
          <input type="password" id="auth-token" placeholder="Enter auth token">
        </div>
        <div class="setting-group">
          <button id="connect-btn" class="btn-primary">Connect</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <!-- Settings button (floating) -->
  <button id="settings-btn" class="settings-fab" aria-label="Settings">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>

  <script src="app.js"></script>
</body>
</html>
